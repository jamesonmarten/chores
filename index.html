<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Family Chores">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#020617">
  <meta name="format-detection" content="telephone=no">
  <meta name="application-name" content="Family Chores &amp; More">
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='38' fill='%23020617'/%3E%3Cpath d='M44 93l27 27 65-73' fill='none' stroke='%2322c55e' stroke-width='18' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='136' cy='132' r='18' fill='%230ea5e9'/%3E%3C/svg%3E">
  <title>Family Chores &amp; More</title>
</head>
<body>

  <!-- INSTALL BANNER -->
  <div id="installBanner" class="installBanner" hidden>
    <strong>Install this app</strong>
    <span>On iPhone: tap Share then Add to Home Screen.</span>
    <button id="dismissInstall" type="button">Got it</button>
  </div>

  <!-- MODE SELECTOR -->
  <div id="modeSelect" class="modeSelect" hidden>
    <div class="modeSelectInner">
      <div class="modeAppName">Family Chores More</div>
      <h1 class="modeTitleBig">Who's here?</h1>
      <div class="modeCards">
        <button class="modeCard modeParent" id="btnParentMode">
          <span class="modeEmoji">&#x1F468;&#x200D;&#x1F469;&#x200D;&#x1F467;&#x200D;&#x1F466;</span>
          <span class="modeLabel">Parent</span>
          <span class="modeDesc">Manage chores and rewards</span>
        </button>
        <button class="modeCard modeKid" id="btnKidMode">
          <span class="modeEmoji">&#x2B50;</span>
          <span class="modeLabel">Kid</span>
          <span class="modeDesc">Do chores and earn points!</span>
        </button>
      </div>
    </div>
  </div>

  <!-- PARENT PIN SCREEN -->
  <div id="pinScreen" class="pinScreen" hidden>
    <div class="pinBox">
      <div class="pinEmoji">&#x1F512;</div>
      <h2 class="pinTitle">Parent Access</h2>
      <p class="pinSub">Enter your 4-digit PIN</p>
      <div class="pinDots" id="pinDots">
        <span></span><span></span><span></span><span></span>
      </div>
      <div class="pinPad" id="pinPad"></div>
      <button class="pinBack" id="pinBackBtn">Back</button>
    </div>
  </div>

  <!-- PARENT DASHBOARD -->
  <div id="parentMode" class="appShell" hidden>
    <header class="parentHeader">
      <div class="headerBrand">
        <span class="headerEmoji">&#x2728;</span>
        <span class="headerTitle">Family Chores</span>
        <span class="headerBadge" id="proBadge" hidden>PRO</span>
      </div>
      <div class="headerActions">
        <button class="iconBtn" id="btnAddKid">+ Kid</button>
        <button class="iconBtn quickToggle" id="btnQuickTheme" title="Toggle light/dark">🌙</button>
        <button class="iconBtn quickToggle" id="btnQuickSfx" title="Toggle sound effects">🔊</button>
        <button class="iconBtn" id="btnSettings">Settings</button>
        <button class="iconBtn" id="btnCalendar">📅 Calendar</button>
        <button class="iconBtn" id="btnCalSync">🔁 Sync</button>
        <button class="iconBtn" id="btnRewards">🏆 Rewards</button>
        <button class="iconBtn" id="btnRoutines">🌟 Routines</button>
        <button class="iconBtn" id="btnLeaderboard">🏅 Leaderboard</button>
        <button class="iconBtn" id="btnWeeklyReport">🖨️ Report</button>
        <button class="iconBtn" id="btnFrameMode" title="Full-screen kitchen display">🖼️ Frame</button>
        <button class="iconBtn" id="btnGrandma" title="Read-only share link for grandparents">👵 Grandma</button>
        <button class="iconBtn honeyBtn" id="btnHoneyDo" hidden>💍 Honey-Do</button>
        <button class="iconBtn proUpgradeBtn" id="topUpgrade">Upgrade Pro</button>
        <button class="iconBtn" id="btnSwitchToKid">Kid View</button>
      </div>
    </header>
    <main class="parentMain">
      <div id="parentNotesStrip" class="notesStripWrap"></div>
      <section class="parentStats" id="parentStats"></section>
      <section class="parentKidsGrid" id="parentKidsGrid"></section>
      <section class="historySection">
        <div class="sectionHeader">
          <h2>Recent Activity</h2>
          <button class="linkBtn" id="btnClearHistory">Clear all</button>
        </div>
        <div class="historyList" id="historyList"></div>
      </section>
    </main>
  </div>

  <!-- CALENDAR VIEW -->
  <div id="calendarMode" class="appShell" hidden>
    <header class="parentHeader">
      <div class="headerBrand">
        <span class="headerEmoji">📅</span>
        <span class="headerTitle">Family Calendar</span>
      </div>
      <div class="headerActions">
        <button class="iconBtn calViewBtn active" id="btnCalMonth">Month</button>
        <button class="iconBtn calViewBtn" id="btnCalWeek">Week</button>
        <button class="iconBtn calViewBtn" id="btnCalDay">Day</button>
        <button class="iconBtn" id="btnCalPrev" title="Previous">‹</button>
        <button class="iconBtn" id="btnCalToday" title="Jump to today">Today</button>
        <button class="iconBtn" id="btnCalNext" title="Next">›</button>
        <button class="iconBtn" id="btnCalSync2">🔁 Sync</button>
        <button class="iconBtn" id="btnCalBack">← Back</button>
      </div>
    </header>
    <main class="calMain">
      <!-- Today's snapshot strip -->
      <section class="calTodaySection">
        <div class="calSectionLabel">Today at a Glance</div>
        <div class="calTodayStrip" id="calTodayStrip"></div>
      </section>
      <!-- Month / Week grid -->
      <section class="calGridSection">
        <div class="calGridHeader" id="calGridHeader"></div>
        <div id="calGrid"></div>
      </section>
    </main>
  </div>

  <!-- KID SELECTOR -->
  <div id="kidSelectScreen" class="kidSelectScreen" hidden>
    <div class="kidSelectInner">
      <button class="backFloatBtn" id="btnKidSelectBack">Back</button>
      <h2 class="kidSelectTitle">Who are you?</h2>
      <div class="kidSelectGrid" id="kidSelectGrid"></div>
    </div>
  </div>

  <!-- KID DASHBOARD -->
  <div id="kidMode" class="kidModeShell" hidden>
    <header class="kidHeader" id="kidHeader">
      <button class="kidBackBtn" id="btnKidBack">Switch</button>
      <div class="kidHeaderInfo" id="kidHeaderInfo"></div>
    </header>
    <main class="kidMain" id="kidMain"></main>
  </div>

  <!-- SHARED MODAL -->
  <div id="modal" class="modal" hidden>
    <div class="modalBox">
      <div id="eggIcon" class="eggIcon"></div>
      <h2 id="modalTitle"></h2>
      <p id="modalText"></p>
      <div id="modalPrice" class="price" hidden>$6/mo</div>
      <div class="modalActions">
        <button id="modalConfirm" class="btn green" hidden></button>
        <button id="closeModal" class="btn">Close</button>
      </div>
    </div>
  </div>

  <!-- PARENT FORM MODAL -->
  <div id="parentModal" class="modal" hidden>
    <div class="modalBox wide" id="parentModalBox"></div>
  </div>

  <!-- CONFETTI -->
  <div id="confettiLayer" class="confetti"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
